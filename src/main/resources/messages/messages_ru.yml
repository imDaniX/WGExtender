common:
  error:
    player-only: Эта команда только для игроков.
    no-permission: '&4Недостаточно прав.'
    player-not-found: '&4Игрока {player} не существует!'
claim:
  error:
    global: Нельзя заприватить __global__.
    format: '&4{error}'
    restricted-symbols: Имя региона '{id}' содержит запрещённые символы.
    config-too-big: Сконфигурированный максимальный размер привата имеет недопустимое значение. 
      Оно не должно превышать 2147483647. Пожалуйста, свяжитесь с админитстрацией.
    already-exists: Регион с таким именем уже существует, выберите другое.
    too-many: У вас слишком много регионов. Удалите один, прежде чем заприватить новый.
    too-big: 'Размер региона слишком большой. Максимальный размер: {maxVolume}, ваш размер: {volume}.'
    overlap: Это регион перекрывает чужой регион.
    only-inside-own: Вы можете приватить только внутри своих регионов.
    only-cuboid: Вы можете использовать только кубическую территорию.
    exception: '&eПроизошла ошибка при привате региона {id}.'
    incomplete: 'Сначала выделите территорию. Используйте WorldEdit для выделения (wiki: https://worldedit.enginehub.org/).'
    deny-max-volume: |-
      &4Вы не можете заприватить такой большой регион.
      Ваш лимит: {limit}, вы попытались заприватить: {volume}.
    deny-min-volume: |-
      &4Вы не можете заприватить такой маленький регион.
      Минимальный объем: {limit}, вы попытались заприватить: {volume}.
    deny-horizontal: |-
      &4Вы не можете заприватить такой узкий регион.
      Минимальная ширина: {limit}, вы попытались заприватить: {volume}.
    deny-vertical: |-
      &4Вы не можете заприватить такой низкий регион.
      Минимальная высота: {limit}, вы попытались заприватить: {volume}.
  success: '&eВы заприватили регион {id}.'
  auto-vert: '&eРегион автоматически расширен по вертикали.'
wand:
  given: '&dВыдан предмет для выделения территории.'
  item-name: '&dВыделение территории'
flags:
  chorus-restricted: '&4Вы не можете использовать хорус в этом регионе.'
  consume-restricted: '&4Вы не можете употреблять предметы в этом регионе.'
  rename-restricted: '&4Вы не можете переименовывать мобов в этом регионе.'
damage:
  mob: бить это
  vehicle: ломать это
  decoration: менять это
  pvp: драться
  player: наносить урон этому
  non-hostile: вредить этому
  other: бить это
restricted-command: '&4Вы не можете использовать эту команду в чужом регионе.'
wgex-command:
  unknown-subcommand: '&bНеизвестная подкоманда ''{subcommand}''.'
  reload:
    help: '&bwgex reload - перезагрузить конфиг'
    success: '&bКонфиг перезагружен.'
  search:
    help: '&bwgex search - ищет регионы в выделенной области.'
    not-found: '&bРегионов пересекающихся с выделенной зоной не найдено.'
    found: '&bНайдены регионы пересекающиеся с выделенной зоной: {regions}'
    incomplete-selection: '&bСначала выделите зону поиска.'
  setflag:
    help: '&bwgex setflag <мир> <флаг> <значение> - устанавливает флаг <флаг> со значением <значение> на все регионы в мире <мир>'
    world-not-found: '&bМир не найден.'
    flag-not-found: '&bФлаг не найден.'
    success: '&bФлаги установлены.'
    invalid-format: '&bНеправильный формат флага {flag}: {error}'
  removeowner:
    help: '&bwgex removeowner <имя> - удаляет игрока из списков владельцев всех регионов'
    success: '&bИгрок удалён из списков владельцев всех регионов.'
  removemember:
    help: '&bwgex removemember <имя> - удаляет игрока из списков членов всех регионов'
    success: '&bИгрок удалён из списков участников всех регионов.'
  limits:
    help: '&bwgex limit - управление кэшем лимитов блоков'
    refresh:
      help: '&bwgex limits refresh <имя> - обновить кэш для игрока'
      success: '&bЛимит игрока {player} обновлён: {limit}.'
    clear:
      help: '&bwgex limits clear - очистить текущий кэш'
      success: '&bКэш лимитов сброшен.'
  update:
    help: '&bwgex update - проверить наличие новой версии плагина'
    start: '&bПроверка обновлений...'
    available: |-
      &bДоступна новая версия: {remote} [{versionType}]. Текущая: {current}.
      &bВы можете скачать её с https://modrinth.com/plugin/wgextender-x
    ahead: '&bТекущая версия ({current}) новее последней опубликованной ({remote}).'
    up-to-date: '&bУстановлена последняя версия: {current}.'
    failure: |-
      &bОшибка при проверке обновлений: {exception}.
      &bВы можете проверить вручную на https://modrinth.com/plugin/wgextender-x
    unknown: '&bНе удалось определить подходящую версию для сравнения.'
